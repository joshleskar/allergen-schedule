<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Allergen Schedule" />
  <meta name="theme-color" content="#2d4a3e" />
  <title>🌱 Baby Allergen Schedule</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --green-dark: #2d4a3e;
      --green-mid: #3d6b58;
      --green-light: #e8f5f0;
      --orange: #f4a261;
      --teal: #52b788;
      --purple: #9d8ec4;
      --bg: #faf8f4;
      --white: #ffffff;
      --text: #1a2e26;
      --muted: #7a8c84;
      --border: #e4ede8;
      --radius: 16px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow-x: hidden;
    }

    .header {
      background: linear-gradient(160deg, var(--green-dark) 0%, #1a3a2e 100%);
      color: white;
      padding: calc(var(--safe-top) + 20px) 20px 18px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-eyebrow { font-size: 10px; letter-spacing: 3px; opacity: 0.55; text-transform: uppercase; margin-bottom: 4px; }
    .header h1 { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; letter-spacing: -0.3px; }
    .header-sub { font-size: 12px; opacity: 0.65; margin-top: 4px; }
    .tab-bar { display: flex; gap: 8px; justify-content: center; margin-top: 14px; }
    .tab-btn {
      background: transparent; border: 1px solid rgba(255,255,255,0.3);
      color: white; border-radius: 20px; padding: 5px 16px;
      font-size: 12px; font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: background 0.2s;
    }
    .tab-btn.active { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.5); }

    .scroll-body {
      max-width: 520px; margin: 0 auto;
      padding: 18px 16px calc(var(--safe-bottom) + 24px);
    }

    .card {
      background: var(--white); border-radius: var(--radius);
      padding: 16px 18px; margin-bottom: 12px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.07);
    }

    .nav-row { display: flex; align-items: center; gap: 12px; }
    .nav-btn {
      width: 38px; height: 38px; border-radius: 50%;
      border: 1.5px solid var(--border); background: var(--white);
      font-size: 20px; color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    .nav-btn:disabled { color: #ccc; border-color: #eee; background: #f8f8f8; cursor: default; }
    .nav-btn:not(:disabled):active { background: var(--green-light); }
    .nav-center { flex: 1; text-align: center; }
    .nav-day { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--green-dark); }
    .nav-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .progress-track { background: #eaefec; border-radius: 4px; height: 5px; margin-top: 9px; overflow: hidden; }
    .progress-fill { background: var(--green-dark); height: 5px; border-radius: 4px; transition: width 0.35s ease; }

    .phase-card {
      border-radius: var(--radius); padding: 18px;
      margin-bottom: 12px; border: 2px solid;
      box-shadow: 0 1px 8px rgba(0,0,0,0.05);
    }
    .phase-card.intro       { background: #fff9f5; border-color: var(--orange); }
    .phase-card.confirm     { background: #f2fdf7; border-color: var(--teal); }
    .phase-card.maintenance { background: #f7f5ff; border-color: var(--purple); }
    .phase-card.blank       { background: #f8f8f8; border-color: #ccc; }

    .phase-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .badge {
      color: white; border-radius: 20px; padding: 3px 11px;
      font-size: 9px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase;
    }
    .badge.intro       { background: var(--orange); }
    .badge.confirm     { background: var(--teal); }
    .badge.maintenance { background: var(--purple); }
    .badge.blank       { background: #aaa; }

    .done-label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px; color: var(--muted); }
    .done-label input[type=checkbox] { width: 17px; height: 17px; accent-color: var(--green-dark); cursor: pointer; }

    .allergen-pill {
      display: flex; align-items: center; gap: 10px;
      border-radius: 12px; padding: 10px 14px; margin-bottom: 10px;
      border: 2px solid;
    }
    .allergen-emoji { font-size: 28px; flex-shrink: 0; }
    .allergen-name { font-family: 'DM Serif Display', serif; font-size: 18px; }
    .allergen-how  { font-size: 12px; color: #666; margin-top: 2px; }
    .dose-box {
      background: rgba(0,0,0,0.05); border-radius: 9px;
      padding: 9px 12px; font-size: 13px; color: #444;
    }

    .section-label { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
    .section-sub   { font-size: 11px; color: #bbb; margin-bottom: 10px; }
    .chip-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip {
      border-radius: 20px; padding: 4px 12px;
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; border: 1px solid;
    }
    .disclaimer {
      margin-top: 12px; font-size: 11px; color: #aaa;
      border-top: 1px solid var(--border); padding-top: 10px; line-height: 1.5;
    }

    .overview-banner {
      background: var(--green-dark); color: white; border-radius: 12px;
      padding: 12px 16px; margin-bottom: 14px; font-size: 13px; line-height: 1.6;
    }
    .overview-row {
      border-radius: 10px; padding: 11px 14px; margin-bottom: 6px;
      cursor: pointer; display: flex; align-items: center; gap: 10px;
      border: 1px solid; border-left-width: 4px; transition: transform 0.1s;
      background: var(--white);
    }
    .overview-row:active { transform: scale(0.985); }
    .overview-row.done   { background: #f0fff5; border-color: var(--teal) !important; }
    .overview-day { width: 30px; font-size: 11px; font-weight: 600; color: var(--muted); flex-shrink: 0; text-align: center; }
    .overview-text { flex: 1; font-size: 13px; }
    .overview-emojis { color: #bbb; font-size: 13px; }
    .overview-badge {
      color: white; border-radius: 20px; padding: 2px 9px;
      font-size: 9px; font-weight: 700; letter-spacing: 0.8px;
      flex-shrink: 0;
    }

    .phase-divider {
      text-align: center; font-size: 11px; letter-spacing: 2px;
      color: var(--muted); text-transform: uppercase;
      margin: 14px 0 8px; display: flex; align-items: center; gap: 8px;
    }
    .phase-divider::before, .phase-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .science-row { display: flex; gap: 9px; margin-bottom: 9px; align-items: flex-start; }
    .science-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .science-text { font-size: 12px; color: #555; line-height: 1.55; }

    .install-banner {
      background: linear-gradient(135deg, #1a3a2e, #2d6b52);
      color: white; border-radius: var(--radius); padding: 14px 16px;
      margin-bottom: 14px; display: flex; gap: 12px; align-items: flex-start;
    }
    .install-icon { font-size: 24px; flex-shrink: 0; margin-top: 2px; }
    .install-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .install-steps { font-size: 12px; opacity: 0.85; line-height: 1.7; }
    .install-close { background: none; border: none; color: white; opacity: 0.6; font-size: 18px; cursor: pointer; align-self: flex-start; flex-shrink: 0; margin-left: auto; }

    .support-line {
      text-align: center; font-size: 12px; color: var(--muted);
      margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border);
    }
    .support-line a { color: var(--green-mid); text-decoration: none; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Science-Backed Protocol</div>
  <h1>🌱 Baby Allergen Introduction</h1>
  <div class="header-sub" id="header-sub">60-day schedule · 11 allergens</div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchView('day')" id="tab-day">📅 Day View</button>
    <button class="tab-btn" onclick="switchView('overview')" id="tab-overview">📋 Overview</button>
  </div>
</div>

<div class="scroll-body">
  <div id="install-banner" class="install-banner">
    <div class="install-icon">📲</div>
    <div>
      <div class="install-title">Add to Home Screen</div>
      <div class="install-steps">Tap the <strong>Share</strong> button (□↑) in Safari → scroll down → <strong>"Add to Home Screen"</strong> → tap Add. It'll work offline too!</div>
    </div>
    <button class="install-close" onclick="dismissBanner()">✕</button>
  </div>

  <div id="view-day"></div>
  <div id="view-overview" style="display:none"></div>
</div>

<script>
// ── Allergen definitions ──────────────────────────────────────────────────────
const ALL_ALLERGENS = [
  { id:"peanut",   name:"Peanut",      emoji:"🥜", how:"¼ tsp smooth peanut butter thinned with breast milk",color:"#c8956c" },
  { id:"egg",      name:"Egg",         emoji:"🥚", how:"¼ tsp well-cooked scrambled egg yolk, mashed fine",  color:"#e8b84b" },
  { id:"milk",     name:"Cow's Milk",  emoji:"🥛", how:"¼ tsp plain whole-milk yogurt",                      color:"#d4aa60" },
  { id:"soy",      name:"Soy",         emoji:"🫛", how:"¼ tsp plain silken tofu mashed fine",                color:"#a8c073" },
  // Phase 2 allergens introduced one at a time after day 30
  { id:"cashew",   name:"Cashew",      emoji:"🌰", how:"¼ tsp cashew butter thinned with breast milk",       color:"#b5835a" },
  { id:"walnut",   name:"Walnut",      emoji:"🫘", how:"¼ tsp walnut butter thinned with breast milk",       color:"#8b6347" },
  { id:"almond",   name:"Almond",      emoji:"🥜", how:"¼ tsp almond butter thinned with breast milk",       color:"#d4a96a" },
  { id:"sesame",   name:"Sesame",      emoji:"🌿", how:"¼ tsp tahini thinned with breast milk",              color:"#c9b882" },
  { id:"wheat",    name:"Wheat",       emoji:"🌾", how:"¼ tsp cream of wheat cereal made with breast milk",  color:"#d4b483" },
  { id:"fish",     name:"Fish",        emoji:"🐟", how:"¼ tsp well-cooked white fish (cod/tilapia) mashed",  color:"#6ba5d0" },
  { id:"shellfish",name:"Shellfish",   emoji:"🦐", how:"¼ tsp well-cooked shrimp, pureed fine",              color:"#e87d5a" },
];

// ── Helpers ───────────────────────────────────────────────────────────────────
function hex2rgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function getAllergen(id) { return ALL_ALLERGENS.find(a => a.id === id); }

/**
 * Given a list of confirmed allergens (objects), generate a 7-day rotation
 * where each allergen appears exactly `targetFreq` times per week.
 * Returns array of 7 entries, each being an array of allergen objects (or [] for blank).
 * maxPerBottle: max allergens to mix in one bottle.
 */
function buildWeekRotation(confirmed, targetFreq, maxPerBottle) {
  const n = confirmed.length;
  if (n === 0) return Array(7).fill([]);

  // We need n * targetFreq slots across 7 days, each slot holds up to maxPerBottle
  // Strategy: round-robin with combos, seeded deterministically
  const slots = []; // each slot = array of allergen objects
  // Create a list of (allergen, count_remaining) and distribute
  // Use a greedy combination approach: fill each day with up to maxPerBottle
  // ensuring each allergen hits targetFreq

  // Build a count array
  const counts = confirmed.map(() => targetFreq);
  const week = Array(7).fill(null).map(() => []);

  // Assign allergens to days greedily, rotating start index each day
  let startIdx = 0;
  for (let day = 0; day < 7; day++) {
    let added = 0;
    let tried = 0;
    let idx = startIdx;
    while (added < maxPerBottle && tried < n) {
      if (counts[idx] > 0) {
        week[day].push(confirmed[idx]);
        counts[idx]--;
        added++;
      }
      idx = (idx + 1) % n;
      tried++;
    }
    startIdx = (startIdx + Math.max(1, maxPerBottle)) % n;
  }

  // If any counts remain (can happen with odd combos), sprinkle leftovers
  for (let i = 0; i < n; i++) {
    let remaining = counts[i];
    for (let day = 0; day < 7 && remaining > 0; day++) {
      if (week[day].length < maxPerBottle && !week[day].includes(confirmed[i])) {
        week[day].push(confirmed[i]);
        remaining--;
      }
    }
  }

  return week;
}

// ── Schedule builder ──────────────────────────────────────────────────────────
function buildSchedule() {
  const schedule = []; // array of day objects indexed by day number (1-based)
  // Each entry: { day, phase, newAllergen, bottleContents:[], note }

  // ── PHASE 1: Days 1–30 ───────────────────────────────────────────────────
  // Introduce soy, milk, egg, peanut (3 days each: intro, confirm, rest)
  // Then rotate all 4 confirmed allergens for the rest of Phase 1.
  const phase1Core = ALL_ALLERGENS.slice(0, 4); // soy, milk, egg, peanut
  const phase1Intro = []; // confirmed so far during intros

  // Intro days: 3 days per allergen = 12 days total
  for (let i = 0; i < phase1Core.length; i++) {
    const a = phase1Core[i];
    const dayBase = i * 3 + 1;

    // Day 1 of intro: solo introduction
    schedule.push({
      day: dayBase,
      phase: 'intro',
      newAllergen: a,
      bottleContents: [a],
      note: `Introduce ${a.name} alone — start small (¼ tsp) and watch for 2 hours.`
    });

    // Day 2 of intro: confirm + mix with already-confirmed
    const mixWith = [...phase1Intro];
    schedule.push({
      day: dayBase + 1,
      phase: 'confirm',
      newAllergen: a,
      bottleContents: [a, ...mixWith],
      note: `Confirming ${a.name}. Mix with all previously confirmed allergens.`
    });

    phase1Intro.push(a);

    // Day 3: rest/blank (unless last allergen)
    schedule.push({
      day: dayBase + 2,
      phase: i < phase1Core.length - 1 ? 'blank' : 'maintenance',
      newAllergen: null,
      bottleContents: [],
      note: i < phase1Core.length - 1
        ? 'Rest day — breast milk only. Watch for any delayed reactions.'
        : 'All 4 Phase 1 allergens confirmed! Rest before starting rotation.'
    });
  }

  // Days 13–30: rotate all 4 confirmed allergens (3x/week each, max 2 per bottle)
  // That's 18 days of rotation
  const confirmed4 = [...phase1Core];
  // 4 allergens × 3x/week = 12 slots across 7 days, max 2/bottle → 6 bottles, 1 blank/week
  const rotationWeeks1 = Math.ceil(18 / 7);
  let rotDay = 13;
  for (let w = 0; w < rotationWeeks1 && rotDay <= 30; w++) {
    const weekRotation = buildWeekRotation(confirmed4, 3, 2);
    for (let d = 0; d < 7 && rotDay <= 30; d++, rotDay++) {
      const contents = weekRotation[d];
      schedule.push({
        day: rotDay,
        phase: contents.length === 0 ? 'blank' : 'maintenance',
        newAllergen: null,
        bottleContents: contents,
        note: contents.length === 0
          ? 'Rest day — breast milk only.'
          : `Maintenance mix: ${contents.map(a=>a.name).join(' + ')}`
      });
    }
  }

  // ── PHASE 2: Days 31–60 ──────────────────────────────────────────────────
  // Introduce remaining 7 allergens one at a time (3 days each = 21 days for 7)
  // Then rotate ALL confirmed allergens for remaining days
  const phase2New = ALL_ALLERGENS.slice(4); // 7 allergens
  const confirmedAll = [...phase1Core]; // grows as we confirm new ones

  let p2Day = 31;

  // Introduce each new allergen: 3 days (intro solo, confirm + sample of confirmed, blank)
  for (let i = 0; i < phase2New.length && p2Day <= 57; i++) {
    const a = phase2New[i];

    // Intro day: solo
    schedule.push({
      day: p2Day++,
      phase: 'intro',
      newAllergen: a,
      bottleContents: [a],
      note: `Introducing ${a.name} solo. Watch for 2 hours after feeding.`
    });

    // Confirm day: new allergen + up to 2 confirmed others (keep bottle manageable)
    const sampleConfirmed = confirmedAll.slice(-2); // last 2 confirmed
    schedule.push({
      day: p2Day++,
      phase: 'confirm',
      newAllergen: a,
      bottleContents: [a, ...sampleConfirmed],
      note: `Confirming ${a.name}. Mixed with recently confirmed allergens.`
    });

    confirmedAll.push(a);

    // Rest day
    schedule.push({
      day: p2Day++,
      phase: 'blank',
      newAllergen: null,
      bottleContents: [],
      note: 'Rest day — breast milk only. Watch for delayed reactions.'
    });
  }

  // Days after all intros through day 60: rotate all confirmed allergens
  // With 11 allergens × 2x/week = 22 slots, max 4/bottle → 6 bottles + 1 blank
  while (p2Day <= 60) {
    const weekRotation = buildWeekRotation(confirmedAll, 2, 3);
    for (let d = 0; d < 7 && p2Day <= 60; d++, p2Day++) {
      const contents = weekRotation[d];
      schedule.push({
        day: p2Day,
        phase: contents.length === 0 ? 'blank' : 'maintenance',
        newAllergen: null,
        bottleContents: contents,
        note: contents.length === 0
          ? 'Rest day — breast milk only.'
          : `Full rotation: ${contents.map(a=>a.name).join(' + ')}`
      });
    }
  }

  // Sort by day just in case
  schedule.sort((a, b) => a.day - b.day);

  // Ensure we have exactly days 1–60 (fill any gaps with blank)
  const byDay = {};
  for (const s of schedule) byDay[s.day] = s;
  const full = [];
  for (let d = 1; d <= 60; d++) {
    full.push(byDay[d] || {
      day: d, phase: 'blank', newAllergen: null, bottleContents: [],
      note: 'Rest day — breast milk only.'
    });
  }
  return full;
}

const SCHEDULE = buildSchedule();

let currentDay = parseInt(localStorage.getItem('allergen_currentDay') || '1');
let checked    = JSON.parse(localStorage.getItem('allergen_checked') || '{}');
let view       = 'day';

function save() {
  localStorage.setItem('allergen_currentDay', currentDay);
  localStorage.setItem('allergen_checked', JSON.stringify(checked));
}

function switchView(v) {
  view = v;
  document.getElementById('view-day').style.display      = v === 'day'      ? '' : 'none';
  document.getElementById('view-overview').style.display = v === 'overview' ? '' : 'none';
  document.getElementById('tab-day').classList.toggle('active', v === 'day');
  document.getElementById('tab-overview').classList.toggle('active', v === 'overview');
  if (v === 'overview') renderOverview();
}

function dismissBanner() {
  document.getElementById('install-banner').style.display = 'none';
  localStorage.setItem('installDismissed', '1');
}

function renderDay() {
  const d = SCHEDULE[currentDay - 1];
  const total = SCHEDULE.length;
  const pct   = Math.round((currentDay / total) * 100);
  const phaseLabels = { intro:'NEW INTRO', confirm:'CONFIRM', maintenance:'MAINTAIN', blank:'REST DAY' };
  const phaseColors = { intro:' var(--orange)', confirm:'var(--teal)', maintenance:'var(--purple)', blank:'#aaa' };

  let html = `
    <div class="card nav-row">
      <button class="nav-btn" onclick="changeDay(-1)" ${currentDay===1?'disabled':''}>‹</button>
      <div class="nav-center">
        <div class="nav-day">Day ${currentDay}</div>
        <div class="nav-sub">${currentDay <= 30 ? 'Phase 1 · Core 4' : 'Phase 2 · Full Rotation'} · Day ${currentDay} of ${total}</div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <button class="nav-btn" onclick="changeDay(1)" ${currentDay===total?'disabled':''}>›</button>
    </div>

    <div class="phase-card ${d.phase}">
      <div class="phase-header">
        <span class="badge ${d.phase}">${phaseLabels[d.phase]}</span>
        <label class="done-label">
          <input type="checkbox" ${checked[currentDay]?'checked':''} onchange="toggleCheck(${currentDay})" /> Done ✓
        </label>
      </div>`;

  if (d.phase === 'blank') {
    html += `
      <div style="font-size:28px;margin-bottom:8px;">🍼</div>
      <div style="font-size:15px;font-weight:600;color:#666;">Breast milk only today.</div>
      <div style="font-size:13px;color:#999;margin-top:6px;line-height:1.5;">${d.note}</div>`;
  } else if (d.newAllergen) {
    const a = d.newAllergen;
    html += `
      <div style="font-size:12px;color:#999;margin-bottom:8px;">${d.phase==='intro'?'Introducing today:':'Confirming today:'}</div>
      <div class="allergen-pill" style="background:${hex2rgba(a.color,0.12)};border-color:${a.color};">
        <span class="allergen-emoji">${a.emoji}</span>
        <div>
          <div class="allergen-name">${a.name}</div>
          <div class="allergen-how">${a.how}</div>
        </div>
      </div>
      <div class="dose-box">💊 <strong>Dose:</strong> ${d.phase==='intro' ? 'Start small: pea-sized (~¼ tsp). Offer alone first.' : 'Increase to ½–1 tsp. Mix with the allergens shown below.'}</div>`;
  } else {
    // Maintenance
    html += `
      <div style="font-size:13px;color:#5a4080;font-weight:600;margin-bottom:6px;">Rotation maintenance day.</div>
      <div style="font-size:13px;color:#777;">${d.note}</div>`;
  }

  html += `</div>`;

  // Bottle contents card
  if (d.bottleContents.length > 0) {
    const label = d.newAllergen
      ? (d.phase === 'intro' ? "Today's bottle 🍼" : "Mix into today's bottle 🥣")
      : "Today's bottle combo 🍼";
    html += `<div class="card">
      <div class="section-label">${label}</div>
      <div class="section-sub">${d.bottleContents.length === 1 ? 'Solo introduction — offer alone.' : `${d.bottleContents.length} allergens combined in one bottle.`}</div>
      <div class="chip-wrap">`;
    for (const a of d.bottleContents) {
      html += `<div class="chip" style="background:${hex2rgba(a.color,0.12)};border-color:${hex2rgba(a.color,0.4)};">
        <span>${a.emoji}</span><span>${a.name}</span></div>`;
    }
    html += `</div>
      <div class="disclaimer">⚠️ Each confirmed allergen should appear 2–3× per week in rotation. Never skip a confirmed allergen entirely for more than a few days.</div>
    </div>`;
  }

  html += scienceNotes();
  html += supportLine();

  document.getElementById('view-day').innerHTML = html;
}

function renderOverview() {
  const phaseColors  = { intro:'#f4a261', confirm:'#52b788', maintenance:'#9d8ec4', blank:'#bbb' };
  const phaseLabels  = { intro:'NEW INTRO', confirm:'CONFIRM', maintenance:'MAINTAIN', blank:'REST' };

  let html = `
    <div class="overview-banner">
      <strong>Phase 1 (Days 1–30):</strong> Introduce &amp; confirm soy, milk, egg, and peanut. Rotate them in pairs through the rest of the phase.<br><br>
      <strong>Phase 2 (Days 31–60):</strong> Introduce 7 more allergens one at a time, then rotate all confirmed allergens 2–3× per week in varied combinations.
    </div>`;

  let lastPhase = null;
  for (const d of SCHEDULE) {
    const isP1 = d.day <= 30;
    const phaseName = isP1 ? 'Phase 1 · Core 4' : 'Phase 2 · Full Rotation';
    if (phaseName !== lastPhase) {
      html += `<div class="phase-divider">${phaseName}</div>`;
      lastPhase = phaseName;
    }

    const done = !!checked[d.day];
    const lc   = phaseColors[d.phase];
    const contents = d.bottleContents.map(a => a.emoji).join('');
    const intro = d.newAllergen ? `<strong>${d.newAllergen.emoji} ${d.newAllergen.name}</strong>` : '';
    const combo = contents ? `<span class="overview-emojis">${contents}</span>` : '';

    let text = '';
    if (d.phase === 'blank') {
      text = `<span style="color:#aaa;">🍼 Breast milk only</span>`;
    } else if (d.newAllergen) {
      text = `${intro} ${combo} <span style="color:#aaa;font-size:12px;">— ${phaseLabels[d.phase]}</span>`;
    } else {
      text = `${combo || '<span style="color:#ccc;">—</span>'} <span style="color:#aaa;font-size:12px;">— ${phaseLabels[d.phase]}</span>`;
    }

    html += `<div class="overview-row ${done?'done':''}" style="border-color:${lc};" onclick="gotoDay(${d.day})">
      <div class="overview-day">${done ? '✅' : 'D'+d.day}</div>
      <div class="overview-text">${text}</div>
      <span class="overview-badge" style="background:${lc};">${phaseLabels[d.phase]}</span>
    </div>`;
  }

  html += scienceNotes();
  html += supportLine();
  document.getElementById('view-overview').innerHTML = html;
}

function scienceNotes() {
  const rules = [
    ['🕐','Introduce in the morning at home so you can watch for 2 hours'],
    ['🆕','Never introduce TWO new allergens on the same day'],
    ['🥣','Combining confirmed allergens with a new one is safe and encouraged'],
    ['🔄','NEVER remove a tolerated food — ongoing exposure builds lasting tolerance'],
    ['👶','Skip if baby is sick, has a fever, or has an active eczema flare'],
    ['🏥','Severe eczema or sibling with peanut allergy? Check with allergist first'],
    ['💊','Reaction signs: hives, vomiting, swelling, trouble breathing → stop & call doctor'],
  ];
  let html = `<div class="card" style="margin-top:8px;">
    <div class="section-label" style="margin-bottom:10px;">Key science rules</div>`;
  for (const [icon,text] of rules)
    html += `<div class="science-row"><span class="science-icon">${icon}</span><span class="science-text">${text}</span></div>`;
  html += `</div>`;
  return html;
}

function supportLine() {
  return `<div class="support-line">
    If this app helps your family, please consider <a href="https://paypal.me/YOURUSERNAME">supporting this work</a> via PayPal or <a href="https://venmo.com/YOURUSERNAME">Venmo</a>. 💙
  </div>`;
}

function changeDay(delta) {
  const next = currentDay + delta;
  if (next < 1 || next > SCHEDULE.length) return;
  currentDay = next;
  save();
  renderDay();
}

function gotoDay(d) {
  currentDay = d;
  save();
  switchView('day');
  renderDay();
}

function toggleCheck(day) {
  checked[day] = !checked[day];
  save();
  renderDay();
}

// Init
if (localStorage.getItem('installDismissed')) dismissBanner();
renderDay();
</script>
</body>
</html>
