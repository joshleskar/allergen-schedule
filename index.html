<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Allergen Schedule" />
  <meta name="theme-color" content="#2d4a3e" />
  <title>🌱 Baby Allergen Schedule</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --green-dark: #2d4a3e;
      --green-mid: #3d6b58;
      --green-light: #e8f5f0;
      --orange: #f4a261;
      --teal: #52b788;
      --purple: #9d8ec4;
      --bg: #faf8f4;
      --white: #ffffff;
      --text: #1a2e26;
      --muted: #7a8c84;
      --border: #e4ede8;
      --radius: 16px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(160deg, var(--green-dark) 0%, #1a3a2e 100%);
      color: white;
      padding: calc(var(--safe-top) + 20px) 20px 18px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-eyebrow { font-size: 10px; letter-spacing: 3px; opacity: 0.55; text-transform: uppercase; margin-bottom: 4px; }
    .header h1 { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; letter-spacing: -0.3px; }
    .header-sub { font-size: 12px; opacity: 0.65; margin-top: 4px; }

    .tab-bar {
      display: flex; gap: 8px; justify-content: center; margin-top: 14px;
    }
    .tab-btn {
      background: transparent; border: 1px solid rgba(255,255,255,0.3);
      color: white; border-radius: 20px; padding: 5px 16px;
      font-size: 12px; font-family: 'DM Sans', sans-serif;
      cursor: pointer; transition: background 0.2s;
    }
    .tab-btn.active { background: rgba(255,255,255,0.22); border-color: rgba(255,255,255,0.5); }

    /* ── Scroll container ── */
    .scroll-body {
      max-width: 520px; margin: 0 auto;
      padding: 18px 16px calc(var(--safe-bottom) + 24px);
    }

    /* ── Cards ── */
    .card {
      background: var(--white); border-radius: var(--radius);
      padding: 16px 18px; margin-bottom: 12px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.07);
    }

    /* ── Day navigator ── */
    .nav-row { display: flex; align-items: center; gap: 12px; }
    .nav-btn {
      width: 38px; height: 38px; border-radius: 50%;
      border: 1.5px solid var(--border); background: var(--white);
      font-size: 20px; color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    .nav-btn:disabled { color: #ccc; border-color: #eee; background: #f8f8f8; cursor: default; }
    .nav-btn:not(:disabled):active { background: var(--green-light); }
    .nav-center { flex: 1; text-align: center; }
    .nav-day { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--green-dark); }
    .nav-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .progress-track { background: #eaefec; border-radius: 4px; height: 5px; margin-top: 9px; overflow: hidden; }
    .progress-fill { background: var(--green-dark); height: 5px; border-radius: 4px; transition: width 0.35s ease; }

    /* ── Phase card ── */
    .phase-card {
      border-radius: var(--radius); padding: 18px;
      margin-bottom: 12px; border: 2px solid;
      box-shadow: 0 1px 8px rgba(0,0,0,0.05);
    }
    .phase-card.intro     { background: #fff9f5; border-color: var(--orange); }
    .phase-card.confirm   { background: #f2fdf7; border-color: var(--teal); }
    .phase-card.maintenance { background: #f7f5ff; border-color: var(--purple); }

    .phase-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .badge {
      color: white; border-radius: 20px; padding: 3px 11px;
      font-size: 9px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase;
    }
    .badge.intro     { background: var(--orange); }
    .badge.confirm   { background: var(--teal); }
    .badge.maintenance { background: var(--purple); }

    .done-label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px; color: var(--muted); }
    .done-label input[type=checkbox] { width: 17px; height: 17px; accent-color: var(--green-dark); cursor: pointer; }

    .allergen-pill {
      display: flex; align-items: center; gap: 10px;
      border-radius: 12px; padding: 10px 14px; margin-bottom: 10px;
      border: 2px solid;
    }
    .allergen-emoji { font-size: 28px; flex-shrink: 0; }
    .allergen-name { font-family: 'DM Serif Display', serif; font-size: 18px; }
    .allergen-how  { font-size: 12px; color: #666; margin-top: 2px; }

    .dose-box {
      background: rgba(0,0,0,0.05); border-radius: 9px;
      padding: 9px 12px; font-size: 13px; color: #444;
    }

    /* ── Combination row ── */
    .section-label { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
    .section-sub   { font-size: 11px; color: #bbb; margin-bottom: 10px; }
    .chip-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip {
      border-radius: 20px; padding: 4px 12px;
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; border: 1px solid;
    }
    .disclaimer {
      margin-top: 12px; font-size: 11px; color: #aaa;
      border-top: 1px solid var(--border); padding-top: 10px; line-height: 1.5;
    }

    /* ── Overview ── */
    .overview-banner {
      background: var(--green-dark); color: white; border-radius: 12px;
      padding: 12px 16px; margin-bottom: 14px; font-size: 13px; line-height: 1.6;
    }
    .overview-row {
      border-radius: 10px; padding: 11px 14px; margin-bottom: 6px;
      cursor: pointer; display: flex; align-items: center; gap: 10px;
      border: 1px solid; border-left-width: 4px; transition: transform 0.1s;
      background: var(--white);
    }
    .overview-row:active { transform: scale(0.985); }
    .overview-row.done   { background: #f0fff5; border-color: var(--teal) !important; }
    .overview-day { width: 30px; font-size: 11px; font-weight: 600; color: var(--muted); flex-shrink: 0; text-align: center; }
    .overview-text { flex: 1; font-size: 13px; }
    .overview-emojis { color: #bbb; font-size: 13px; }
    .overview-badge {
      color: white; border-radius: 20px; padding: 2px 9px;
      font-size: 9px; font-weight: 700; letter-spacing: 0.8px;
      flex-shrink: 0;
    }

    /* ── Science notes ── */
    .science-row { display: flex; gap: 9px; margin-bottom: 9px; align-items: flex-start; }
    .science-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .science-text { font-size: 12px; color: #555; line-height: 1.55; }

    /* ── Install banner ── */
    .install-banner {
      background: linear-gradient(135deg, #1a3a2e, #2d6b52);
      color: white; border-radius: var(--radius); padding: 14px 16px;
      margin-bottom: 14px; display: flex; gap: 12px; align-items: flex-start;
    }
    .install-icon { font-size: 24px; flex-shrink: 0; margin-top: 2px; }
    .install-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
    .install-steps { font-size: 12px; opacity: 0.85; line-height: 1.7; }
    .install-close { background: none; border: none; color: white; opacity: 0.6; font-size: 18px; cursor: pointer; align-self: flex-start; flex-shrink: 0; margin-left: auto; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Science-Backed Protocol</div>
  <h1>🌱 Baby Allergen Introduction</h1>
  <div class="header-sub" id="header-sub">33-day schedule · 11 allergens</div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchView('day')" id="tab-day">📅 Day View</button>
    <button class="tab-btn" onclick="switchView('overview')" id="tab-overview">📋 Overview</button>
  </div>
</div>

<div class="scroll-body">
  <div id="install-banner" class="install-banner">
    <div class="install-icon">📲</div>
    <div>
      <div class="install-title">Add to Home Screen</div>
      <div class="install-steps">Tap the <strong>Share</strong> button (□↑) in Safari → scroll down → <strong>"Add to Home Screen"</strong> → tap Add. It'll work offline too!</div>
    </div>
    <button class="install-close" onclick="dismissBanner()">✕</button>
  </div>

  <div id="view-day"></div>
  <div id="view-overview" style="display:none"></div>
</div>

<script>
const ALLERGENS = [
  { id:"peanut",   name:"Peanut",      emoji:"🥜", how:"¼ tsp smooth peanut butter thinned with breast milk", color:"#c8956c" },
  { id:"egg",      name:"Egg",         emoji:"🥚", how:"¼ tsp well-cooked scrambled egg yolk, mashed fine",   color:"#e8b84b" },
  { id:"milk",     name:"Cow's Milk",  emoji:"🥛", how:"¼ tsp plain whole-milk yogurt",                       color:"#d4aa60" },
  { id:"cashew",   name:"Cashew",      emoji:"🌰", how:"¼ tsp cashew butter thinned with breast milk",        color:"#b5835a" },
  { id:"walnut",   name:"Walnut",      emoji:"🫘", how:"¼ tsp walnut butter thinned with breast milk",        color:"#8b6347" },
  { id:"almond",   name:"Almond",      emoji:"🌰", how:"¼ tsp almond butter thinned with breast milk",        color:"#d4a96a" },
  { id:"sesame",   name:"Sesame",      emoji:"🌿", how:"¼ tsp tahini thinned with breast milk",               color:"#c9b882" },
  { id:"soy",      name:"Soy",         emoji:"🫛", how:"¼ tsp plain silken tofu mashed fine",                 color:"#a8c073" },
  { id:"wheat",    name:"Wheat",       emoji:"🌾", how:"¼ tsp cream of wheat cereal made with breast milk",   color:"#d4b483" },
  { id:"fish",     name:"Fish",        emoji:"🐟", how:"¼ tsp well-cooked white fish (cod/tilapia) mashed",   color:"#6ba5d0" },
  { id:"shellfish",name:"Shellfish",   emoji:"🦐", how:"¼ tsp well-cooked shrimp, pureed fine",               color:"#e87d5a" },
];

function buildSchedule() {
  const days = []; const confirmed = [];
  for (let i = 0; i < ALLERGENS.length; i++) {
    const a = ALLERGENS[i]; const d = i * 3 + 1;
    days.push({ day:d, label:"Intro Day 1", newAllergen:a, combinedWith:[...confirmed], dose:"Start small: pea-sized (~¼ tsp). Mix with confirmed allergens in same feeding.", phase:"intro" });
    days.push({ day:d+1, label:"Intro Day 2", newAllergen:a, combinedWith:[...confirmed], dose:"Increase to ½–1 tsp. Combine with all confirmed allergens.", phase:"confirm" });
    confirmed.push(a);
    if (i < ALLERGENS.length - 1)
      days.push({ day:d+2, label:"Maintenance Day", newAllergen:null, combinedWith:[...confirmed], dose:null, phase:"maintenance" });
  }
  return days;
}

const SCHEDULE = buildSchedule();
let currentDay = parseInt(localStorage.getItem('currentDay') || '1');
let checked    = JSON.parse(localStorage.getItem('checked') || '{}');
let view       = 'day';

function save() {
  localStorage.setItem('currentDay', currentDay);
  localStorage.setItem('checked', JSON.stringify(checked));
}

function switchView(v) {
  view = v;
  document.getElementById('view-day').style.display      = v === 'day'      ? '' : 'none';
  document.getElementById('view-overview').style.display = v === 'overview' ? '' : 'none';
  document.getElementById('tab-day').classList.toggle('active', v === 'day');
  document.getElementById('tab-overview').classList.toggle('active', v === 'overview');
  if (v === 'overview') renderOverview();
}

function dismissBanner() {
  document.getElementById('install-banner').style.display = 'none';
  localStorage.setItem('installDismissed', '1');
}

function hex2rgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function renderDay() {
  const d = SCHEDULE[currentDay - 1];
  const total = SCHEDULE.length;
  const pct   = Math.round((currentDay / total) * 100);
  const phaseLabels = { intro:'NEW INTRO', confirm:'CONFIRM', maintenance:'MAINTAIN' };

  let html = `
    <!-- Navigator -->
    <div class="card nav-row">
      <button class="nav-btn" onclick="changeDay(-1)" ${currentDay===1?'disabled':''}>‹</button>
      <div class="nav-center">
        <div class="nav-day">Day ${currentDay}</div>
        <div class="nav-sub">of ${total} days total</div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <button class="nav-btn" onclick="changeDay(1)" ${currentDay===total?'disabled':''}>›</button>
    </div>

    <!-- Phase card -->
    <div class="phase-card ${d.phase}">
      <div class="phase-header">
        <span class="badge ${d.phase}">${phaseLabels[d.phase]}</span>
        <label class="done-label">
          <input type="checkbox" ${checked[currentDay]?'checked':''} onchange="toggleCheck(${currentDay})" /> Done ✓
        </label>
      </div>`;

  if (d.phase === 'maintenance') {
    html += `<div style="font-size:15px;color:#5a4080;font-weight:600;">Rest &amp; maintain day.</div>
             <div style="font-size:13px;color:#777;margin-top:6px;font-family:'DM Sans',sans-serif;">No new allergen today — offer all confirmed foods.</div>`;
  }

  if (d.newAllergen) {
    const a = d.newAllergen;
    html += `
      <div style="font-size:12px;color:#999;margin-bottom:8px;">${d.phase==='intro'?'Introducing today:':'Confirming today:'}</div>
      <div class="allergen-pill" style="background:${hex2rgba(a.color,0.12)};border-color:${a.color};">
        <span class="allergen-emoji">${a.emoji}</span>
        <div>
          <div class="allergen-name">${a.name}</div>
          <div class="allergen-how">${a.how}</div>
        </div>
      </div>
      <div class="dose-box">💊 <strong>Dose:</strong> ${d.dose}</div>`;
  }

  html += `</div>`;

  // Combined feeding card
  if (d.combinedWith.length > 0) {
    html += `<div class="card">
      <div class="section-label">${d.newAllergen ? 'Mix into the same feeding 🥣' : 'Offer all confirmed foods today'}</div>`;
    if (d.newAllergen) html += `<div class="section-sub">Already confirmed — combine freely with today's new allergen.</div>`;
    html += `<div class="chip-wrap">`;
    for (const a of d.combinedWith) {
      html += `<div class="chip" style="background:${hex2rgba(a.color,0.12)};border-color:${hex2rgba(a.color,0.4)};">
        <span>${a.emoji}</span><span>${a.name}</span></div>`;
    }
    html += `</div><div class="disclaimer">⚠️ Never remove a tolerated allergen — ongoing exposure builds lasting tolerance.</div></div>`;
  }

  // Science notes
  html += scienceNotes();

  document.getElementById('view-day').innerHTML = html;
}

function renderOverview() {
  const phaseColors = { intro:'#f4a261', confirm:'#52b788', maintenance:'#9d8ec4' };
  const phaseLabels = { intro:'NEW INTRO', confirm:'CONFIRM', maintenance:'MAINTAIN' };
  let html = `
    <div class="overview-banner">
      <strong>How this works:</strong> Each allergen gets 2 intro days. From day 4 onward the new allergen is mixed with all previously confirmed ones in the same feeding. The combination only ever grows — never remove a confirmed food.
    </div>`;

  for (const d of SCHEDULE) {
    const done = !!checked[d.day];
    const lc   = phaseColors[d.phase];
    html += `<div class="overview-row ${done?'done':''}" style="border-color:${lc};" onclick="gotoDay(${d.day})">
      <div class="overview-day">${done ? '✅' : 'D'+d.day}</div>
      <div class="overview-text">
        ${d.newAllergen
          ? `<strong>${d.newAllergen.emoji} ${d.newAllergen.name}</strong>${d.combinedWith.length ? `<span class="overview-emojis"> + ${d.combinedWith.map(a=>a.emoji).join('')}</span>` : ''} <span style="color:#aaa;font-size:12px;">— ${d.label}</span>`
          : `<span style="color:#aaa;">Maintain: ${d.combinedWith.map(a=>a.emoji).join(' ')}</span>`
        }
      </div>
      <span class="overview-badge" style="background:${lc};">${phaseLabels[d.phase]}</span>
    </div>`;
  }

  html += scienceNotes();
  document.getElementById('view-overview').innerHTML = html;
}

function scienceNotes() {
  const rules = [
    ['🕐','Introduce in the morning at home so you can watch for 2 hours'],
    ['🆕','Never introduce TWO new allergens on the same day'],
    ['🥣','Combining confirmed allergens with a new one is safe and encouraged'],
    ['🔄','NEVER remove a tolerated food — ongoing exposure builds lasting tolerance'],
    ['👶','Skip if baby is sick, has a fever, or has an active eczema flare'],
    ['🏥','Severe eczema or sibling with peanut allergy? Check with allergist first'],
    ['💊','Reaction signs: hives, vomiting, swelling, trouble breathing → stop & call doctor'],
  ];
  let html = `<div class="card" style="margin-top:8px;">
    <div class="section-label" style="margin-bottom:10px;">Key science rules</div>`;
  for (const [icon,text] of rules)
    html += `<div class="science-row"><span class="science-icon">${icon}</span><span class="science-text">${text}</span></div>`;
  html += `</div>`;
  return html;
}

function changeDay(delta) {
  const next = currentDay + delta;
  if (next < 1 || next > SCHEDULE.length) return;
  currentDay = next;
  save();
  renderDay();
}

function gotoDay(d) {
  currentDay = d;
  save();
  switchView('day');
  renderDay();
}

function toggleCheck(day) {
  checked[day] = !checked[day];
  save();
  renderDay();
}

// Init
if (localStorage.getItem('installDismissed')) dismissBanner();
renderDay();
</script>
</body>
</html>
